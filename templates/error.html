{% extends "base.html" %}
{% block title %}Error — Cricket Predictor{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh] text-center fade-in">
  <div class="card bg-base-200 shadow-xl max-w-lg w-full">
    <div class="card-body items-center text-center">
      <div class="text-6xl mb-4">⚠️</div>
      <h2 class="card-title text-error text-2xl">{{ title or "Something went wrong" }}</h2>
      <p class="text-base-content/70 mt-2">{{ message or "An unexpected error occurred." }}</p>
      <div class="card-actions mt-6 gap-3">
        <a href="/" class="btn btn-primary">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1" /></svg>
          Back to Home
        </a>
        <button class="btn btn-outline"
                hx-post="/api/recheck-spoda"
                hx-target="#spoda-banner"
                hx-swap="innerHTML"
                onclick="setTimeout(() => window.location.reload(), 1500)">
          Retry Connection
        </button>
      </div>
    </div>
  </div>
</div>
{% endblock %}
