<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Cricket Predictor{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.min.css') }}">
  <script src="{{ url_for('static', filename='js/htmx.min.js') }}" defer></script>
</head>
<body class="min-h-screen bg-base-100">

  <!-- Navbar -->
  <div class="navbar bg-base-200 shadow-lg sticky top-0 z-50">
    <div class="navbar-start">
      <a href="/" class="btn btn-ghost text-xl gap-2">
        <span class="text-2xl">🏏</span>
        <span class="font-bold">Cricket Predictor</span>
      </a>
    </div>
    <div class="navbar-end gap-2">
      {% if spoda_ok %}
      <div class="tooltip tooltip-bottom" data-tip="Spoda API connected">
        <div class="badge badge-success gap-1">
          <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-success opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-success"></span></span>
          API
        </div>
      </div>
      {% else %}
      <div class="tooltip tooltip-bottom" data-tip="{{ spoda_error or 'Spoda API disconnected' }}">
        <div class="badge badge-error gap-1">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
          API
        </div>
      </div>
      {% endif %}
      {% block nav_extra %}{% endblock %}
    </div>
  </div>

  <!-- Spoda Error Banner -->
  <div id="spoda-banner">
  {% if not spoda_ok %}
  {% include "partials/spoda_error_banner.html" %}
  {% endif %}
  </div>

  <!-- Content -->
  <main class="container mx-auto px-4 py-8 max-w-7xl">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="footer footer-center p-6 bg-base-200 text-base-content mt-12">
    <p class="opacity-60">Powered by Spoda AI &bull; Data refreshed every 6 hours</p>
  </footer>

</body>
</html>
